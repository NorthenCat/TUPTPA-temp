<input
  [attr.type]="type"
  [attr.id]="id || null"
  [attr.name]="name || null"
  [attr.placeholder]="placeholder || null"
  [attr.autocomplete]="autocomplete || null"
  [attr.aria-label]="ariaLabel || null"
  [attr.min]="min || null"
  [attr.max]="max || null"
  [attr.step]="step || null"
  [attr.pattern]="pattern || null"
  [readonly]="readonly"
  [required]="required"
  [disabled]="disabled"
  [ngClass]="classes"
  [value]="value"
  (input)="handleInput($event)"
  (blur)="handleBlur()"
/>
